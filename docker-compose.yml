version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: healthbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"

  backend:
    build: ./backend-drf
    env_file:
      - ./backend-drf/.env.example
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  ai-langchain:
    build: ./ai-langchain
    env_file:
      - ./ai-langchain/.env.example
    depends_on:
      - qdrant
      - redis
    ports:
      - "8100:8100"

  frontend:
    build: ./frontend-react
    env_file:
      - ./frontend-react/.env.example
    ports:
      - "3000:3000"

volumes:
  pgdata:
